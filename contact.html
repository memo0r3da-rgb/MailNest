<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="تواصل مع فريق MailNest للاستفسارات والدعم والخصوصية." />
    <meta name="robots" content="index, follow" />
    <meta name="google-adsense-account" content="ca-pub-4435388073656818" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4435388073656818" crossorigin="anonymous"></script>
    <title>تواصل معنا | MailNest</title>
    <link rel="canonical" href="https://mailnest.pages.dev/contact" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="contact">
    <main class="page standalone-page">
      <div data-site-header></div>
      <section class="content-section page-content">
        <p class="eyebrow">Contact</p>
        <h1>تواصل معنا</h1>
        <p class="lead">
          ارسل رسالتك من النموذج وسيتم تحويلها إلى البريد:
          <a class="text-link" href="mailto:memo0r3da@gmail.com">memo0r3da@gmail.com</a>
        </p>

        <form class="contact-form" id="contactForm" action="https://formsubmit.co/memo0r3da@gmail.com" method="POST">
          <input type="hidden" name="_subject" value="رسالة جديدة من MailNest" />
          <input type="hidden" name="_template" value="table" />
          <input type="hidden" name="_captcha" value="false" />
          <input type="text" name="_honey" tabindex="-1" autocomplete="off" class="honeypot" />

          <label>
            الاسم
            <input type="text" name="name" placeholder="اسمك" required />
          </label>
          <label>
            البريد
            <input type="email" name="email" placeholder="you@example.com" required />
          </label>
          <label>
            نوع الرسالة
            <select name="topic" required>
              <option value="دعم">دعم</option>
              <option value="استفسار بريميوم">استفسار بريميوم</option>
              <option value="إعلان">إعلان</option>
              <option value="خصوصية">خصوصية</option>
            </select>
          </label>
          <label>
            الرسالة
            <textarea name="message" rows="6" placeholder="اكتب رسالتك هنا" required></textarea>
          </label>
          <button class="primary-button" type="submit">
            <i data-lucide="send"></i>
            إرسال إلى Gmail
          </button>
          <div class="form-status" id="contactStatus" role="status" aria-live="polite"></div>
        </form>

        <p class="small-note">
          أول رسالة عبر FormSubmit قد تحتاج تأكيد البريد من رسالة تصل إلى Gmail لتفعيل استقبال النماذج.
        </p>
      </section>
      <div data-site-footer></div>
    </main>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="site-data.js"></script>
    <script src="seo-articles.js"></script>
    <script src="site.js"></script>
    <script src="contact.js"></script>
  </body>
</html>
